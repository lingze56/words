<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小背词 Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        :root {
            --primary: #8fb9a8; --accent: #fcd0ba; --bg: #f7f9f8; 
            --card: #ffffff; --text: #546e7a; --success: #81c784; --danger: #ef9a9a;
        }

        body { 
            font-family: "PingFang SC", sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }

        /* 顶部看板 */
        .dashboard { 
            background: var(--card); border-radius: 20px; padding: 15px;
            margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-row { display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px;}
        .stat-val { font-size: 22px; font-weight: 800; color: var(--primary); display: block; text-align: center;}
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: var(--bg); padding: 8px; border-radius: 12px; }
        .cal-day { font-size: 9px; text-align: center; padding: 4px 0; border-radius: 4px; position: relative; color: #bbb; }
        .has-checkin { color: var(--text); font-weight: bold; }
        .has-checkin::after { content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; background: var(--primary); border-radius: 50%; }

        /* 导航切换 - 彻底去除所有动画过渡 */
        nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        nav button { padding: 12px 0; background: var(--card); color: var(--primary); font-size: 13px; border: none; border-radius: 12px; cursor: pointer; }
        nav button.active { background: var(--primary); color: white; }

        /* 视图容器 - display 瞬时切换 */
        section { 
            display: none; background: var(--card); padding: 20px; 
            border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            width: 100%; box-sizing: border-box; flex-direction: column; 
        }
        section.active { display: flex; }

        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #f0f4f2; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box;}
        .big-btn { border: none; border-radius: 12px; font-weight: 600; cursor: pointer; padding: 16px; font-size: 15px; width: 100%; margin-top: 8px; background: var(--primary); color: white; }

        /* 消除赛：6x5 紧凑布局 */
        #matchGrid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .card { 
            background: var(--bg); padding: 4px 2px; text-align: center; border-radius: 6px; font-size: 10px; min-height: 50px;
            display: flex; align-items: center; justify-content: center; border: 1.5px solid transparent; cursor: pointer;
            overflow: hidden; word-break: break-all; line-height: 1.1;
        }
        .card.selected { border-color: var(--primary); background: white; font-weight: bold; }
        .card.matched { visibility: hidden; pointer-events: none; }

        #qFeedback { text-align: center; margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 13px; min-height: 60px; }
        .feedback-correct { background: #e8f5e9; color: #2e7d32; }
        .feedback-wrong { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="stat-row">
            <div class="stat-item"><span id="streakDays" class="stat-val">0</span><span style="font-size:10px;opacity:0.6">打卡天数</span></div>
            <div class="stat-item"><span id="todayCount" class="stat-val">0</span><span style="font-size:10px;opacity:0.6">今日词量</span></div>
            <button onclick="doCheckin()" style="padding: 8px 15px; background: var(--accent); color: #8d6e63; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-size:12px;">签到</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <nav id="navbar">
        <button onclick="changeView('manage')" class="active">库管理</button>
        <button onclick="changeView('prep')">去背词</button>
        <button onclick="changeView('review')">熟练度</button>
        <button onclick="changeView('match')">消除赛</button>
    </nav>

    <div class="view-container">
        <section id="manage" class="active">
            <h3>词库配置</h3>
            <button class="big-btn" onclick="loadBuiltIn()">激活考研核心词库</button>
            <div style="margin-top:20px;">
                <p style="font-size:12px; color: #999;">支持导入您上传的 .docx 文档：</p>
                <input type="file" id="wordFile" accept=".docx">
                <button class="big-btn" style="background:none; border:2px solid var(--primary); color:var(--primary);" onclick="handleWordImport()">追加文档单词</button>
            </div>
            <button onclick="clearAll()" style="margin-top: 30px; background:none; border:none; color:#ddd; font-size:10px; cursor:pointer;">重置本地所有数据</button>
        </section>

        <section id="prep">
            <h3>学习设置</h3>
            <select id="studySource">
                <option value="mixed">全部词汇混合</option>
                <option value="builtin">仅内置词库</option>
                <option value="imported">仅导入文档</option>
            </select>
            <input type="number" id="customSize" value="20" placeholder="本组单词数">
            <button class="big-btn" onclick="startStudy(false)">开始背诵</button>
        </section>

        <section id="study_core">
            <div id="studyInfo" style="font-size:10px; text-align:center; opacity:0.4;"></div>
            <div id="qPrompt" style="font-size:36px; text-align:center; margin:25px 0; color:var(--primary); font-weight:800;"></div>
            <input type="text" id="uInput" placeholder="输入中文意思..." autocomplete="off">
            <button class="big-btn" onclick="handleCheck()">确认</button>
            <div id="qFeedback"></div>
        </section>

        <section id="review">
            <h3>熟练度进度</h3>
            <div id="masteryStats" style="font-size: 11px; display: flex; justify-content: space-between; margin-bottom: 12px; background: var(--bg); padding: 10px; border-radius: 10px;">
                <span>待学: <b id="m0">0</b></span> <span>初识: <b id="m1">0</b></span> <span>掌握: <b id="m2">0</b></span>
            </div>
            <div id="wrongList" style="flex-grow:1; overflow-y:auto; font-size:13px; max-height: 350px;"></div>
            <button class="big-btn" onclick="startStudy(true)">强化复习 Lv.0-2</button>
        </section>

        <section id="match">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin:0">消除赛 (6x5)</h3>
                <select id="matchRange" style="width: auto; padding: 4px; margin: 0; font-size: 11px;" onchange="renderMatch()">
                    <option value="recent">最近背诵</option>
                    <option value="all">全部单词</option>
                </select>
            </div>
            <div id="matchGrid"></div>
            <button class="big-btn" style="margin-top:10px;" onclick="renderMatch()">换一批</button>
        </section>
    </div>
</div>

<script>
// --- 初始化数据（尝试读取旧进度） ---
let builtInWords = JSON.parse(localStorage.getItem('builtin_words') || '[]');
let importedWords = JSON.parse(localStorage.getItem('imported_words') || '[]');
let history = JSON.parse(localStorage.getItem('study_history') || '{}');
let masteryMap = JSON.parse(localStorage.getItem('mastery_map') || '{}');
let checkins = JSON.parse(localStorage.getItem('checkins') || '[]');
let lastStudiedQueue = JSON.parse(localStorage.getItem('last_studied_queue') || '[]');

function save(){
    localStorage.setItem('builtin_words', JSON.stringify(builtInWords));
    localStorage.setItem('imported_words', JSON.stringify(importedWords));
    localStorage.setItem('study_history', JSON.stringify(history));
    localStorage.setItem('mastery_map', JSON.stringify(masteryMap));
    localStorage.setItem('checkins', JSON.stringify(checkins));
    localStorage.setItem('last_studied_queue', JSON.stringify(lastStudiedQueue));
    updateDashboard();
}

// --- 页面切换：无动画瞬切 ---
function changeView(id){
    document.querySelectorAll('section').forEach(s => {
        s.style.display = 'none';
        s.classList.remove('active');
    });
    const target = document.getElementById(id);
    if(target) {
        target.style.display = 'flex';
        target.classList.add('active');
    }
    document.querySelectorAll('#navbar button').forEach(b => b.classList.remove('active'));
    const idxMap = {manage:0, prep:1, review:2, match:3, study_core:1};
    if(idxMap[id] !== undefined) document.querySelectorAll('#navbar button')[idxMap[id]].classList.add('active');
    if(id === 'match') renderMatch();
    if(id === 'review') renderMastery();
}

// --- 看板逻辑 ---
function renderCalendar(){
    const grid = document.getElementById('calendarGrid'); grid.innerHTML = "";
    const now = new Date();
    for(let i=13; i>=0; i--){
        const d = new Date(); d.setDate(now.getDate() - i);
        const dateStr = d.toLocaleDateString();
        const dom = document.createElement('div');
        dom.className = 'cal-day' + (checkins.includes(dateStr) ? ' has-checkin' : '');
        dom.innerText = d.getDate();
        grid.appendChild(dom);
    }
}

function updateDashboard(){
    const t = new Date().toLocaleDateString();
    document.getElementById('todayCount').innerText = history[t] || 0;
    let s = 0; let d = new Date();
    while(checkins.includes(d.toLocaleDateString())){ s++; d.setDate(d.getDate()-1); }
    document.getElementById('streakDays').innerText = s;
    renderCalendar();
}

function doCheckin(){
    const t = new Date().toLocaleDateString();
    if(!checkins.includes(t)){ checkins.push(t); save(); }
}

// --- 核心背词逻辑 ---
let currentIdx = 0, studyPool = [];
function startStudy(isReview){
    let base = [...builtInWords, ...importedWords];
    if(isReview) studyPool = base.filter(w => (masteryMap[w.en] || 0) < 3).sort(()=>Math.random()-0.5).slice(0, 20);
    else {
        const src = document.getElementById('studySource').value;
        if(src === 'builtin') base = builtInWords;
        else if(src === 'imported') base = importedWords;
        studyPool = base.sort(()=>Math.random()-0.5).slice(0, document.getElementById('customSize').value || 20);
    }
    if(studyPool.length === 0) return alert("词库为空或已全部掌握");
    currentIdx = 0; changeView('study_core'); nextQ();
}

function nextQ(){
    if(currentIdx >= studyPool.length){ alert("本组完成！"); return changeView('prep'); }
    document.getElementById('qPrompt').innerText = studyPool[currentIdx].en;
    document.getElementById('studyInfo').innerText = `${currentIdx+1}/${studyPool.length}`;
    document.getElementById('uInput').value = "";
    document.getElementById('qFeedback').className = "";
    document.getElementById('qFeedback').innerHTML = "";
    document.getElementById('uInput').focus();
}

function handleCheck(){
    const user = document.getElementById('uInput').value.trim();
    const target = studyPool[currentIdx];
    const feedback = document.getElementById('qFeedback');
    if(!user) return;
    const isCorrect = target.ch.includes(user);
    if(isCorrect){
        feedback.className = "feedback-correct";
        feedback.innerHTML = `<b>正确</b><br><small>${target.ch}</small>`;
        masteryMap[target.en] = Math.min((masteryMap[target.en] || 0) + 1, 3);
        const t = new Date().toLocaleDateString();
        history[t] = (history[t] || 0) + 1;
        if(!lastStudiedQueue.includes(target.en)) {
            lastStudiedQueue.push(target.en); if(lastStudiedQueue.length > 50) lastStudiedQueue.shift();
        }
        save(); setTimeout(()=>{ if(currentIdx < studyPool.length){currentIdx++; nextQ();} }, 1000);
    } else {
        feedback.className = "feedback-wrong";
        feedback.innerHTML = `<b>记错了</b><br><small>${target.ch}</small>`;
        masteryMap[target.en] = 0; save();
        setTimeout(()=>{ if(currentIdx < studyPool.length){currentIdx++; nextQ();} }, 2000);
    }
}

// --- 消除赛：6x5 ---
function renderMatch(){
    const grid = document.getElementById('matchGrid'); grid.innerHTML = "";
    const range = document.getElementById('matchRange').value;
    let pool = [...builtInWords, ...importedWords];
    if(range === 'recent') pool = pool.filter(w => lastStudiedQueue.includes(w.en));
    if(pool.length < 15) { grid.innerHTML = `<p style="grid-column:span 6; font-size:10px; text-align:center;">单词量不足(需15个)</p>`; return; }
    let gameWords = pool.sort(()=>Math.random()-0.5).slice(0, 15);
    let cards = [];
    gameWords.forEach(w => { cards.push({t: w.en, id: w.en}); cards.push({t: w.ch.split(/[；;]/)[0], id: w.en}); });
    let first = null;
    cards.sort(()=>Math.random()-0.5).forEach(c => {
        const d = document.createElement('div'); d.className = 'card'; d.innerText = c.t;
        d.onclick = () => {
            if(d.classList.contains('matched') || d === first) return;
            d.classList.add('selected');
            if(!first) { first = d; first.dataset.id = c.id; } 
            else {
                if(first.dataset.id === c.id){ d.classList.add('matched'); first.classList.add('matched'); } 
                else { const t = first; setTimeout(()=> { t.classList.remove('selected'); d.classList.remove('selected'); }, 300); }
                first = null;
            }
        };
        grid.appendChild(d);
    });
}

function renderMastery(){
    let mCount = [0,0,0,0];
    const pool = [...builtInWords, ...importedWords];
    pool.forEach(w => mCount[masteryMap[w.en] || 0]++);
    document.getElementById('m0').innerText = mCount[0];
    document.getElementById('m1').innerText = mCount[1] + mCount[2];
    document.getElementById('m2').innerText = mCount[3];
    const list = pool.filter(w => (masteryMap[w.en]||0) < 3);
    document.getElementById('wrongList').innerHTML = list.slice(0, 50).map(w => 
        `<div style="padding:10px; border-bottom:1px solid #f9f9f9; display:flex; justify-content:space-between;">
            <span><b>${w.en}</b> <small style="color:var(--primary)">Lv.${masteryMap[w.en]||0}</small></span>
            <span style="opacity:0.6; font-size:11px;">${w.ch.split(/[；;]/)[0]}</span>
        </div>`).join('');
}

// --- 词库操作 ---
function loadBuiltIn(){
    const data = "custom|风俗;习惯\ndesperate|绝望的\nredundancy|裁员\nilliterate|文盲\nprotocol|协议\nphilosophy|哲学\nempathy|同感\naccuracy|准确性";
    data.split('\n').forEach(line => {
        const [en, ch] = line.split('|');
        if(en && !builtInWords.some(w => w.en === en)) builtInWords.push({en: en.trim(), ch: ch.trim()});
    });
    save(); alert("内置词库已激活");
}

function handleWordImport(){
    const file = document.getElementById('wordFile').files[0];
    if(!file) return;
    mammoth.extractRawText({arrayBuffer: file}).then(res => {
        res.value.split('\n').forEach(line => {
            const match = line.match(/^([a-zA-Z\s\-\']+)(.*)$/);
            if(match && !importedWords.some(w => w.en === match[1].trim()))
                importedWords.push({en: match[1].trim(), ch: match[2].replace(/^[:：\s\-\.]+/, '').trim()});
        });
        save(); alert("文档追加成功");
    }).catch(err => alert("读取失败，请检查网络或文档格式"));
}

function clearAll(){ if(confirm("确定清空吗？")){ localStorage.clear(); location.reload(); } }
document.getElementById('uInput').addEventListener("keydown", e => { if(e.key==="Enter") handleCheck(); });
updateDashboard();
</script>
</body>
</html>
