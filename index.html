<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>小背词</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
 
body {
 font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
 background: #f8f5ef;
 color: #1e2a1f;
 padding-bottom: 76px;
}
 
/* 顶部色条 */
.top-bar { height: 3px; background: linear-gradient(90deg,#6b9e7e,#c9a84c,#c4767e); }
 
/* 底部Tab */
.tab-bar {
 position: fixed; bottom: 0; left: 0; right: 0;
 background: #fff;
 border-top: 1px solid #ece8df;
 display: flex;
 padding-bottom: env(safe-area-inset-bottom);
 z-index: 100;
}
.tab {
 flex: 1; display: flex; flex-direction: column;
 align-items: center; gap: 2px;
 padding: 8px 0; border: none; background: none;
 color: #aaa; font-size: 10px; cursor: pointer;
}
.tab .ti { font-size: 22px; line-height: 1; }
.tab.on { color: #6b9e7e; }
 
/* 页面 */
.page { display: none; padding: 12px 14px 16px; min-height: 100vh; }
.page.on { display: block; }
 
/* 卡片 */
.card {
 background: #fff; border-radius: 18px;
 padding: 18px; border: 1px solid #ece8df;
 box-shadow: 0 2px 10px rgba(30,42,31,0.06);
 margin-bottom: 10px;
}
.card-title {
 font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
 color: #6b9e7e; text-transform: uppercase;
 margin-bottom: 14px;
 display: flex; align-items: center; gap: 8px;
}
.card-title::after { content:''; flex:1; height:1px; background:#ece8df; }
 
/* 按钮 */
.btn {
 display: block; width: 100%; padding: 15px;
 border: none; border-radius: 13px;
 font-size: 15px; font-weight: 600;
 cursor: pointer; text-align: center; margin-bottom: 8px;
}
.btn:last-child { margin-bottom: 0; }
.btn-dark   { background: #1e2a1f; color: #f8f5ef; }
.btn-green  { background: #6b9e7e; color: #fff; }
.btn-outline { background: transparent; color: #6b9e7e; border: 1.5px solid #6b9e7e; }
.btn-ghost  { background: transparent; color: #bbb; border: 1px dashed #ddd; font-size: 13px; padding: 11px; }
 
/* 表单 */
.flabel { font-size: 11px; color: #8a9088; margin-bottom: 5px; display: block; }
select, input[type="number"] {
 width: 100%; padding: 12px 14px;
 border: 1.5px solid #ece8df; border-radius: 12px;
 font-size: 15px; background: #f2ede4; color: #1e2a1f;
 outline: none; -webkit-appearance: none; margin-bottom: 10px;
}
input[type="file"] {
 width: 100%; padding: 10px;
 border: 1.5px dashed #ece8df; border-radius: 12px;
 font-size: 13px; background: #f2ede4; color: #1e2a1f;
 margin-bottom: 10px;
}
 
/* 统计行 */
.stat-row {
 display: flex; justify-content: space-between; align-items: center;
 padding: 10px 0; border-bottom: 1px solid #f5f2ec; font-size: 14px;
}
.stat-row:last-child { border-bottom: none; }
.stat-val { font-weight: 700; color: #6b9e7e; }
 
/* ─── 首页 ─── */
/* 今日总览横条 */
.today-row {
 display: flex; gap: 0; margin-bottom: 10px;
}
.today-stat {
 flex: 1; background: #fff; text-align: center;
 padding: 16px 8px; border: 1px solid #ece8df;
 box-shadow: 0 2px 10px rgba(30,42,31,0.06);
}
.today-stat:first-child { border-radius: 18px 0 0 18px; border-right: none; }
.today-stat:last-child  { border-radius: 0 18px 18px 0; }
.today-stat:not(:first-child):not(:last-child) { border-right: none; }
.ts-num { font-size: 26px; font-weight: 800; color: #6b9e7e; line-height: 1; }
.ts-lbl { font-size: 10px; color: #8a9088; margin-top: 3px; }
 
/* 签到按钮行 */
.ci-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.ci-month { font-size: 12px; color: #8a9088; }
.ci-btn {
 background: #6b9e7e; color: #fff; border: none;
 border-radius: 10px; padding: 8px 18px;
 font-size: 13px; font-weight: 600; cursor: pointer;
}
.ci-btn.done { background: #ece8df; color: #8a9088; cursor: default; }
 
/* 签到日历格 */
.ci-grid {
 display: grid; grid-template-columns: repeat(7,1fr); gap: 4px;
}
.ci-wday { text-align: center; font-size: 9px; color: #ccc; padding-bottom: 2px; }
.ci-cell {
 aspect-ratio: 1; border-radius: 7px;
 background: #f2ede4; border: 1px solid #ece8df;
 display: flex; align-items: center; justify-content: center;
 font-size: 10px; color: #bbb;
}
.ci-cell.hit  { background: #6b9e7e; border-color: #6b9e7e; color: #fff; }
.ci-cell.today { border: 2px solid #c9a84c; color: #c9a84c; font-weight: 700; }
.ci-cell.today.hit { background: #c9a84c; border-color: #c9a84c; color: #fff; }
.ci-cell.empty { background: transparent; border-color: transparent; }
 
/* 主题点 */
.theme-row { display: flex; gap: 10px; flex-wrap: wrap; padding: 2px 0; }
.tdot {
 width: 34px; height: 34px; border-radius: 50%;
 border: 3px solid transparent; cursor: pointer;
 box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.tdot.on { border-color: #1e2a1f; transform: scale(1.12); }
 
/* ─── 学习页 ─── */
/* 流程步骤 */
.flow-bar { display: flex; gap: 5px; margin-bottom: 10px; }
.fs {
 flex: 1; text-align: center; padding: 8px 2px;
 border-radius: 10px; border: 1px solid #ece8df;
 font-size: 9px; color: #ccc; background: #f2ede4;
}
.fs .fi { font-size: 15px; display: block; margin-bottom: 2px; }
.fs.on   { background: #6b9e7e; border-color: #6b9e7e; color: #fff; font-weight: 700; }
.fs.done { background: #e8f3ed; border-color: #e8f3ed; color: #6b9e7e; }
 
/* 背词卡片 */
.study-card {
 background: #fff; border-radius: 18px;
 border: 1px solid #ece8df;
 box-shadow: 0 2px 10px rgba(30,42,31,0.06);
 margin-bottom: 10px; overflow: hidden;
}
.sc-top { padding: 14px 18px 12px; }
.sc-info-row {
 display: flex; justify-content: space-between;
 font-size: 12px; color: #8a9088; margin-bottom: 8px;
}
.sc-prog { height: 4px; background: #ece8df; border-radius: 2px; }
.sc-prog-fill { height: 4px; background: #6b9e7e; border-radius: 2px; transition: width 0.4s; }
 
/* 单词区 */
.sc-word-area {
 padding: 32px 24px 20px;
 text-align: center; min-height: 190px;
 display: flex; flex-direction: column;
 align-items: center; justify-content: center; gap: 12px;
}
.sc-word { font-size: 38px; font-weight: 800; color: #1e2a1f; line-height: 1.15; word-break: break-word; }
.sc-dots { display: flex; justify-content: center; align-items: center; gap: 5px; }
.pdot { width: 8px; height: 8px; border-radius: 50%; background: #ece8df; display: inline-block; }
.pdot.on { background: #c9a84c; }
.ptag { font-size: 10px; padding: 2px 7px; border-radius: 6px; margin-left: 4px; }
.p0{background:#ffeaea;color:#c0392b;}.p1{background:#fff3cd;color:#7a6000;}
.p2{background:#d4edda;color:#155724;}.p3{background:#d1ecf1;color:#0c5460;}.p4{background:#ede7f6;color:#4527a0;}
.sc-hint { font-size: 11px; color: #8a9088; min-height: 16px; }
 
/* 反馈 */
.sc-fb {
 width: 100%; padding: 10px 14px; border-radius: 12px;
 font-size: 13px; line-height: 1.65; text-align: center;
}
.sc-fb:empty { display: none; }
.fb-ok  { background: #edf7f0; border: 1px solid #bce4c8; color: #1a5e2a; }
.fb-err { background: #fff0f0; border: 1px solid #f5c6cb; color: #922; }
 
/* 底部输入 */
.sc-bottom {
 padding: 14px 16px 18px;
 border-top: 1px solid #ece8df;
}
.sc-input {
 display: block; width: 100%; padding: 13px 16px; margin-bottom: 10px;
 border: 1.5px solid #ece8df; border-radius: 12px;
 font-size: 16px; background: #f2ede4; color: #1e2a1f;
 outline: none; text-align: center; -webkit-appearance: none;
}
.sc-input:focus { border-color: #6b9e7e; background: #fff; }
.sc-actions { display: flex; gap: 8px; }
.sc-ok {
 flex: 1; padding: 15px; background: #1e2a1f; color: #f8f5ef;
 border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
}
.sc-skip {
 flex: 0 0 68px; padding: 15px 8px;
 background: #f2ede4; color: #8a9088;
 border: 1px solid #ece8df; border-radius: 12px;
 font-size: 13px; cursor: pointer;
}
 
/* 完成屏 */
.done-wrap { text-align: center; padding: 36px 20px 20px; }
.done-icon  { font-size: 48px; margin-bottom: 12px; }
.done-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.done-sub   { font-size: 13px; color: #8a9088; line-height: 1.7; margin-bottom: 20px; }
 
/* ─── 消除赛 ─── */
.ms-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ms-score { font-size: 22px; font-weight: 800; color: #6b9e7e; }
.ms-pairs { font-size: 12px; color: #8a9088; }
.match-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 12px; }
.mc {
 background: #f2ede4; border: 1.5px solid #ece8df; border-radius: 11px;
 padding: 10px 5px; min-height: 56px;
 display: flex; align-items: center; justify-content: center;
 text-align: center; font-size: 12px; line-height: 1.35;
 cursor: pointer; user-select: none; overflow: hidden;
}
.mc span { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.mc.sel { border-color: #6b9e7e; background: #e8f3ed; color: #6b9e7e; font-weight: 700; }
.mc.ok  { animation: mOk 0.35s forwards; pointer-events: none; }
.mc.err { border-color: #c4767e !important; background: #fff0f0 !important; animation: mErr 0.3s; }
@keyframes mOk  { 0%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);}100%{transform:scale(0);opacity:0;} }
@keyframes mErr { 0%,100%{transform:translateX(0);}30%{transform:translateX(-5px);}70%{transform:translateX(5px);} }
 
/* ─── 错题本 ─── */
.w-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid #f5f2ec; gap: 12px; }
.w-item:last-child { border-bottom: none; }
.w-en { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.w-ch { font-size: 11px; color: #8a9088; line-height: 1.5; text-align: right; max-width: 58%; }
.w-dots { display: flex; gap: 3px; }
</style>
</head>
<body>
<div class="top-bar"></div>
 
<!-- ══════════════════════════════════
    首页：基础信息 + 签到 + 主题 + 导入
══════════════════════════════════ -->
<div class="page on" id="p-home" style="padding-top:14px;">
 
 <!-- 今日总览 -->
 <div class="today-row">
   <div class="today-stat">
     <div class="ts-num" id="streakNum">0</div>
     <div class="ts-lbl">连续打卡</div>
   </div>
   <div class="today-stat">
     <div class="ts-num" id="todayNum">0</div>
     <div class="ts-lbl">今日已学</div>
   </div>
   <div class="today-stat">
     <div class="ts-num" id="totalNum">0</div>
     <div class="ts-lbl">词库总量</div>
   </div>
   <div class="today-stat">
     <div class="ts-num" id="wrongNum">0</div>
     <div class="ts-lbl">错题数量</div>
   </div>
 </div>
 
 <!-- 签到表 -->
 <div class="card">
   <div class="ci-row">
     <span class="ci-month" id="ciMonthLbl"></span>
     <button class="ci-btn" id="ciBtn" onclick="doCheckin()">签到</button>
   </div>
   <!-- 星期头 -->
   <div class="ci-grid" id="ciWeekHead"></div>
   <!-- 日期格 -->
   <div class="ci-grid" id="ciGrid" style="margin-top:4px;"></div>
 </div>
 
 <!-- 主题颜色 -->
 <div class="card">
   <div class="card-title">主题颜色</div>
   <div class="theme-row" id="themeRow"></div>
 </div>
 
 <!-- 导入词库 -->
 <div class="card">
   <div class="card-title">导入词库</div>
   <label class="flabel">上传 .docx（每行：英文 中文，支持 | ： : 空格分隔）</label>
   <input type="file" id="wordFile" accept=".docx">
   <button class="btn btn-outline" onclick="handleImport()">追加导入</button>
   <div id="importMsg" style="font-size:12px;color:#8a9088;margin-top:6px;min-height:16px;"></div>
 </div>
 
</div>
 
<!-- ══════════════════════════════════
    学习页
══════════════════════════════════ -->
<div class="page" id="p-session" style="padding-top:14px;">
 
 <div class="flow-bar">
   <div class="fs" id="fs-config"><span class="fi">⚙</span>配置</div>
   <div class="fs" id="fs-match"><span class="fi">🎯</span>消除赛</div>
   <div class="fs" id="fs-study"><span class="fi">📖</span>背词</div>
   <div class="fs" id="fs-review"><span class="fi">🔁</span>复习</div>
 </div>
 
 <!-- 配置 -->
 <div class="card" id="panConfig">
   <div class="card-title">学习配置</div>
   <label class="flabel">词库来源</label>
   <select id="studySource">
     <option value="mixed">全部混合</option>
     <option value="builtin">仅内置词库</option>
     <option value="imported">仅导入词库</option>
   </select>
   <label class="flabel">学习数量</label>
   <input type="number" id="customSize" value="20" min="5" max="200">
   <p style="font-size:11px;color:#8a9088;margin-bottom:12px;">流程：消除赛热身 → 背词（随机）→ 复习错题（随机）</p>
   <button class="btn btn-dark" onclick="startSession()">开始学习</button>
 </div>
 
 <!-- 消除赛（session内） -->
 <div class="card" id="panMatch" style="display:none;">
   <div class="card-title">消除赛热身</div>
   <div class="ms-bar">
     <div>得分 <span class="ms-score" id="sScore">0</span></div>
     <div class="ms-pairs" id="sPairs"></div>
   </div>
   <div class="match-grid" id="sGrid"></div>
   <div style="display:flex;gap:8px;">
     <button class="btn btn-ghost" style="flex:1;margin:0;" onclick="renderSMatch()">换一组</button>
     <button class="btn btn-outline" style="flex:1;margin:0;" onclick="goToStudy()">跳过→背词</button>
   </div>
 </div>
 
 <!-- 背词 -->
 <div class="study-card" id="panStudy" style="display:none;">
   <div class="sc-top">
     <div class="sc-info-row">
       <span id="studyInfo"></span>
       <span id="studyProf"></span>
     </div>
     <div class="sc-prog"><div class="sc-prog-fill" id="studyProg" style="width:0%"></div></div>
   </div>
   <div class="sc-word-area">
     <div class="sc-word" id="qWord"></div>
     <div class="sc-dots" id="qDots"></div>
     <div class="sc-hint" id="qHint"></div>
     <div class="sc-fb" id="qFb"></div>
   </div>
   <div class="sc-bottom">
     <input class="sc-input" type="text" id="uInput" placeholder="输入中文释义之一…" autocomplete="off" enterkeyhint="done">
     <div class="sc-actions">
       <button class="sc-ok" onclick="checkAnswer()">确认</button>
       <button class="sc-skip" onclick="skipWord()">不会</button>
     </div>
   </div>
 </div>
 
 <!-- 背词完成 -->
 <div class="card" id="panStudyDone" style="display:none;">
   <div class="done-wrap">
     <div class="done-icon">🎉</div>
     <div class="done-title">背词完成！</div>
     <div class="done-sub" id="studyDoneMsg"></div>
   </div>
   <button class="btn btn-dark" onclick="startReview()">复习错题</button>
   <button class="btn btn-ghost" onclick="endSession()">结束本次</button>
 </div>
 
 <!-- 错题复习 -->
 <div class="study-card" id="panReview" style="display:none;">
   <div class="sc-top">
     <div class="sc-info-row">
       <span id="reviewInfo"></span>
       <span>错题复习</span>
     </div>
     <div class="sc-prog"><div class="sc-prog-fill" id="reviewProg" style="width:0%"></div></div>
   </div>
   <div class="sc-word-area">
     <div class="sc-word" id="rWord"></div>
     <div class="sc-dots" id="rDots"></div>
     <div class="sc-fb" id="rFb"></div>
   </div>
   <div class="sc-bottom">
     <input class="sc-input" type="text" id="ruInput" placeholder="输入中文释义之一…" autocomplete="off" enterkeyhint="done">
     <div class="sc-actions">
       <button class="sc-ok" onclick="checkReview()">确认</button>
       <button class="sc-skip" onclick="skipReview()">不会</button>
     </div>
   </div>
 </div>
 
 <!-- 全部完成 -->
 <div class="card" id="panDone" style="display:none;">
   <div class="done-wrap">
     <div class="done-icon">🏆</div>
     <div class="done-title">本次完成！</div>
     <div class="done-sub" id="allDoneMsg"></div>
   </div>
   <button class="btn btn-dark" onclick="endSession()">返回配置</button>
 </div>
 
</div>
 
<!-- ══════════════════════════════════
    消除赛页
══════════════════════════════════ -->
<div class="page" id="p-match" style="padding-top:14px;">
 
 <div class="card" id="mCfgCard">
   <div class="card-title">消除赛</div>
   <label class="flabel">词库选择</label>
   <select id="matchSource">
     <option value="recent">最近学习的单词</option>
     <option value="builtin">全部内置词库</option>
     <option value="imported">全部导入词汇</option>
     <option value="mixed">全部混合</option>
   </select>
   <button class="btn btn-green" onclick="startMatch()">开始消除赛</button>
 </div>
 
 <div class="card" id="mGameCard" style="display:none;">
   <div class="ms-bar">
     <div>
       <div style="font-size:11px;color:#8a9088;" id="mModeLbl"></div>
       <div>得分 <span class="ms-score" id="mScore">0</span></div>
     </div>
     <div class="ms-pairs" id="mPairs"></div>
   </div>
   <div class="match-grid" id="mGrid"></div>
   <div style="display:flex;gap:8px;margin-top:4px;">
     <button class="btn btn-ghost" style="flex:1;margin:0;" onclick="refreshMatch()">换一组</button>
     <button class="btn btn-outline" style="flex:1;margin:0;" onclick="backMatchCfg()">换模式</button>
   </div>
 </div>
 
</div>
 
<!-- ══════════════════════════════════
    错题本页
══════════════════════════════════ -->
<div class="page" id="p-wrong" style="padding-top:14px;">
 
 <div class="card">
   <div class="card-title">错题本</div>
   <div id="wrongList" style="max-height:60vh;overflow-y:auto;">
     <div style="text-align:center;padding:28px;color:#8a9088;font-size:13px;">🌿 暂无错题</div>
   </div>
 </div>
 <button class="btn btn-outline" onclick="doStandaloneReview()">复习所有错题</button>
 
</div>
 
<!-- ══════════════════════════════════
    词库页
══════════════════════════════════ -->
<div class="page" id="p-lib" style="padding-top:14px;">
 
 <div class="card">
   <div class="card-title">词库状态</div>
   <div class="stat-row"><span>内置词库</span><span class="stat-val" id="libBi">0 词</span></div>
   <div class="stat-row"><span>导入词库</span><span class="stat-val" id="libImp">0 词</span></div>
   <div class="stat-row"><span>错题数量</span><span class="stat-val" id="libWrong">0 词</span></div>
 </div>
 
 <div class="card">
   <div class="card-title">内置考研词汇</div>
   <p style="font-size:13px;color:#8a9088;margin-bottom:12px;">包含考研核心词汇，一键激活使用。</p>
   <button class="btn btn-dark" onclick="loadBuiltIn()">激活内置词库</button>
 </div>
 
 <div class="card">
   <div class="card-title">学习统计</div>
   <div class="stat-row"><span>最长连续打卡</span><span class="stat-val" id="maxStreak">0 天</span></div>
   <div class="stat-row"><span>本月打卡</span><span class="stat-val" id="monthCi">0 次</span></div>
   <div class="stat-row"><span>累计学习词数</span><span class="stat-val" id="totalLearned">0 词</span></div>
 </div>
 
 <button class="btn btn-ghost" onclick="clearAll()">清空所有数据</button>
 
</div>
 
<!-- 底部导航 -->
<nav class="tab-bar">
 <button class="tab on" id="tab-home"    onclick="goTab('p-home')">   <span class="ti">🏠</span>首页</button>
 <button class="tab"    id="tab-session" onclick="goTab('p-session')"><span class="ti">📖</span>学习</button>
 <button class="tab"    id="tab-match"   onclick="goTab('p-match')">  <span class="ti">🎯</span>消除赛</button>
 <button class="tab"    id="tab-wrong"   onclick="goTab('p-wrong')">  <span class="ti">📝</span>错题</button>

<script>
// ── 数据 ──
let builtIn   = JSON.parse(localStorage.getItem('bi')     || '[]');
let imported  = JSON.parse(localStorage.getItem('imp')    || '[]');
let prof      = JSON.parse(localStorage.getItem('prof')   || '{}');
let wrongs    = JSON.parse(localStorage.getItem('wrongs') || '[]');
let checkins  = JSON.parse(localStorage.getItem('cis')    || '[]');
let learnHist = JSON.parse(localStorage.getItem('lhist')  || '{}');
let recentEns = JSON.parse(localStorage.getItem('recent') || '[]');
 
function save() {
 localStorage.setItem('bi',     JSON.stringify(builtIn));
 localStorage.setItem('imp',    JSON.stringify(imported));
 localStorage.setItem('prof',   JSON.stringify(prof));
 localStorage.setItem('wrongs', JSON.stringify(wrongs));
 localStorage.setItem('cis',    JSON.stringify(checkins));
 localStorage.setItem('lhist',  JSON.stringify(learnHist));
 localStorage.setItem('recent', JSON.stringify(recentEns));
}
 
function todayStr() { return new Date().toLocaleDateString('zh-CN'); }
 
// ── 导航 ──
const TABS = { 'p-home':'tab-home','p-session':'tab-session','p-match':'tab-match','p-wrong':'tab-wrong','p-lib':'tab-lib' };
 
function goTab(id) {
 document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
 document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
 const pg = document.getElementById(id);
 if (pg) pg.classList.add('on');
 const tb = document.getElementById(TABS[id]);
 if (tb) tb.classList.add('on');
 window.scrollTo(0, 0);
 if (id === 'p-home')    { refreshDash(); renderCalendar(); }
 if (id === 'p-wrong')   renderWrongList();
 if (id === 'p-lib')     refreshLib();
}
 
// ── 主题 ──

 { name:'竹绿', c:'#6b9e7e' },

function applyTheme(name, color) {
 // 更新所有主色元素
 const primaryEls = document.querySelectorAll(
   '.tab.on,.card-title,.stat-val,.ts-num,.ms-score,.ci-btn:not(.done),.btn-green,.btn-outline,.fs.on,.sc-prog-fill,.pdot.on'
 );
 // 直接对关键组件强制赋色
 document.querySelectorAll('.card-title').forEach(el => el.style.color = color);
 document.querySelectorAll('.stat-val, .lib-val, .ts-num, .ms-score').forEach(el => el.style.color = color);
 document.querySelectorAll('.tab.on').forEach(el => el.style.color = color);
 document.querySelectorAll('.ci-btn:not(.done)').forEach(el => el.style.background = color);
 document.querySelectorAll('.btn-green').forEach(el => el.style.background = color);
 document.querySelectorAll('.btn-outline').forEach(el => { el.style.color = color; el.style.borderColor = color; });
 document.querySelectorAll('.fs.on').forEach(el => { el.style.background = color; el.style.borderColor = color; });
 document.querySelectorAll('.fs.done').forEach(el => el.style.color = color);
 document.querySelectorAll('.sc-prog-fill').forEach(el => el.style.background = color);
 document.querySelectorAll('.pdot.on').forEach(el => el.style.background = '#c9a84c');
 document.querySelectorAll('.ci-cell.hit').forEach(el => { el.style.background = color; el.style.borderColor = color; });
 document.querySelector('.top-bar').style.background = `linear-gradient(90deg,${color},#c9a84c,#c4767e)`;
 
 localStorage.setItem('themeColor', color);
 localStorage.setItem('themeName', name);
 renderThemeDots();
}
 
function renderThemeDots() {
 const row = document.getElementById('themeRow'); if (!row) return;
 const saved = localStorage.getItem('themeName') || '竹绿';
 row.innerHTML = THEMES.map(t =>
   `<div class="tdot ${t.name===saved?'on':''}" style="background:${t.c};"
     onclick="applyTheme('${t.name}','${t.c}')"></div>`
 ).join('');
}
 
function loadTheme() {
 const color = localStorage.getItem('themeColor') || '#6b9e7e';
 const name  = localStorage.getItem('themeName')  || '竹绿';
 applyTheme(name, color);
}
 
// ── 签到日历 ──
function doCheckin() {
 const t = todayStr();
 if (checkins.includes(t)) { alert('今天已经打卡啦！'); return; }
 checkins.push(t); save();
 renderCalendar(); refreshDash();
 alert('打卡成功！🎉');
}
 
function renderCalendar() {
 const now = new Date(), y = now.getFullYear(), m = now.getMonth();
 const daysInMonth = new Date(y, m+1, 0).getDate();
 const firstWeekday = new Date(y, m, 1).getDay(); // 0=日
 const todayDate = now.getDate();
 
 document.getElementById('ciMonthLbl').textContent = `${y}年${m+1}月`;
 
 // 更新签到按钮
 const btn = document.getElementById('ciBtn');
 if (checkins.includes(todayStr())) {
   btn.textContent = '已打卡'; btn.classList.add('done');
 } else {
   btn.textContent = '签到'; btn.classList.remove('done');
 }
 
 // 星期头
 const weekHead = document.getElementById('ciWeekHead');
 weekHead.innerHTML = ['日','一','二','三','四','五','六'].map(d =>
   `<div class="ci-wday">${d}</div>`
 ).join('');
 
 // 日期格
 let html = '';
 for (let i = 0; i < firstWeekday; i++) html += '<div class="ci-cell empty"></div>';
 for (let d = 1; d <= daysInMonth; d++) {
   const ds = new Date(y, m, d).toLocaleDateString('zh-CN');
   const hit = checkins.includes(ds);
   const isToday = d === todayDate;
   html += `<div class="ci-cell ${hit?'hit':''} ${isToday?'today':''}">${d}</div>`;
 }
 document.getElementById('ciGrid').innerHTML = html;
 loadTheme(); // 刷新主题色到新渲染的格子
}
 
// ── 仪表盘 ──
function refreshDash() {
 const t = todayStr();
 const s = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
 
 s('todayNum', learnHist[t] || 0);
 s('totalNum', builtIn.length + imported.length);
 s('wrongNum', wrongs.length);
 
 // 连续打卡
 let streak = 0; const d = new Date();
 while (checkins.includes(d.toLocaleDateString('zh-CN'))) { streak++; d.setDate(d.getDate()-1); }
 s('streakNum', streak);
}
 
// ── 词库页统计 ──
function refreshLib() {
 const s = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
 s('libBi', builtIn.length + ' 词');
 s('libImp', imported.length + ' 词');
 s('libWrong', wrongs.length + ' 词');
 
 let maxS = 0, cur = 0;
 [...checkins].sort().forEach((ds, i, arr) => {
   if (i === 0) { cur = 1; }
   else { const diff = (new Date(ds) - new Date(arr[i-1])) / 86400000; cur = diff <= 1.1 ? cur+1 : 1; }
   maxS = Math.max(maxS, cur);
 });
 const now = new Date(), y = now.getFullYear(), mo = now.getMonth();
 const moCnt = checkins.filter(ds => { const dd=new Date(ds); return dd.getFullYear()===y && dd.getMonth()===mo; }).length;
 const totL = Object.values(learnHist).reduce((a,b) => a+b, 0);
 s('maxStreak', maxS + ' 天');
 s('monthCi', moCnt + ' 次');
 s('totalLearned', totL + ' 词');
}

function loadBuiltIn() {
 let n = 0;
 BUILTIN.split('\n').forEach(line => {
   const i = line.indexOf('|'); if (i < 1) return;
   const en = line.slice(0,i).trim(), ch = line.slice(i+1).trim();
   if (en && ch && !builtIn.some(w => w.en===en)) { builtIn.push({en,ch}); n++; }
 });
 save(); refreshLib(); refreshDash();
 alert(`激活完成！词库共 ${builtIn.length} 词（新增 ${n}）`);
}
 
function handleImport() {
 const file = document.getElementById('wordFile').files[0];
 const msg  = document.getElementById('importMsg');
 if (!file) { msg.textContent='请先选择文件'; return; }
 msg.textContent = '解析中…';
 const reader = new FileReader();
 reader.onload = e => {
   mammoth.extractRawText({arrayBuffer: e.target.result}).then(res => {
     let add=0, skip=0;
     res.value.split(/[\r\n]+/).forEach(line => {
       line = line.trim(); if (!line) return;
       let en='', ch='';
       for (const sep of ['|','：',':','\t']) {
         const idx = line.indexOf(sep);
         if (idx > 0) {
           const l=line.slice(0,idx).trim(), r=line.slice(idx+sep.length).trim();
           if (/^[a-zA-Z][\w\s\-']*$/.test(l) && r) { en=l; ch=r; break; }
         }
       }
       if (!en) {
         const m = line.match(/^([a-zA-Z][\w\s\-']{1,30}?)\s{2,}(.{2,})$/);
         if (m) { en=m[1].trim(); ch=m[2].trim(); }
       }
       if (en && ch) {
         if (!imported.some(w=>w.en===en)) { imported.push({en,ch}); add++; }
         else skip++;
       }
     });
     save(); refreshDash();
     msg.textContent = `✓ 新增 ${add} 词，跳过重复 ${skip} 词`;
   }).catch(() => { msg.textContent='✗ 解析失败'; });
 };
 reader.readAsArrayBuffer(file);
}

// ── 熟练度 ──
const PL=['陌生','初识','熟悉','掌握','精通'];
const PC=['p0','p1','p2','p3','p4'];
const PW=[5,4,3,2,1];
function getP(en)   { return prof[en] ?? 0; }
function addP(en,d) { prof[en] = Math.max(0, Math.min(4, (prof[en]??0)+d)); }
 
function renderDots(en, id) {
 const el = document.getElementById(id); if (!el) return;
 const p = getP(en);
 const color = localStorage.getItem('themeColor') || '#6b9e7e';
 el.innerHTML = Array.from({length:5}, (_,i) =>
   `<div class="pdot ${i<p?'on':''}" style="${i<p?'background:#c9a84c':''};display:inline-block;"></div>`
 ).join('') + `<span class="ptag ${PC[p]}">${PL[p]}</span>`;
}
 
function shuffle(a) {
 const r=[...a];
 for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
 return r;
}
 
function wSample(pool, n) {
 if (!pool.length) return [];
 const w=pool.map(x=>PW[getP(x.en)]), total=w.reduce((a,b)=>a+b,0);
 const res=[], used=new Set(); let tries=0;
 while (res.length<Math.min(n,pool.length) && tries<n*30) {
   tries++; let r=Math.random()*total;
   for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0&&!used.has(i)){used.add(i);res.push(pool[i]);break;}}
 }
 pool.forEach((x,i)=>{if(!used.has(i)&&res.length<n){used.add(i);res.push(x);}});
 return res;
}
 
function isMatch(user, ch) {
 if (ch.includes(user)) return true;
 return ch.split(/[；;、\/]+/).some(p => {
   const t=p.trim().replace(/[的地得]/g,'');
   return t && (t.includes(user) || user.includes(t));
 });
}
 
// ── 面板控制 ──
const PANELS=['panConfig','panMatch','panStudy','panStudyDone','panReview','panDone'];
function showPan(id) {
 PANELS.forEach(p => { const el=document.getElementById(p); if(el) el.style.display='none'; });
 const t=document.getElementById(id); if(t) t.style.display='block';
}
 
const COLOR = () => localStorage.getItem('themeColor') || '#6b9e7e';
 
function setFlow(step) {
 const ord={config:0,match:1,study:2,review:3}, cur=ord[step];
 ['config','match','study','review'].forEach(s => {
   const el=document.getElementById('fs-'+s); if(!el) return;
   el.classList.remove('on','done');
   if (ord[s]<cur)   { el.classList.add('done'); el.style.cssText=`background:#e8f3ed;border-color:#e8f3ed;color:${COLOR()}`; }
   else if (s===step){ el.classList.add('on');   el.style.cssText=`background:${COLOR()};border-color:${COLOR()};color:#fff`; }
   else              { el.style.cssText='background:#f2ede4;border-color:#ece8df;color:#ccc'; }
 });
}
 
// ── 学习会话 ──
let sessionPool=[], studyQ=[], reviewQ=[];
let sIdx=0, rIdx=0, sCorrect=0;
 
function startSession() {
 const src = document.getElementById('studySource').value;
 const n   = parseInt(document.getElementById('customSize').value) || 20;
 const base = src==='builtin'?builtIn : src==='imported'?imported : [...builtIn,...imported];
 if (!base.length) { alert('词库为空，请先在词库页激活词库'); goTab('p-lib'); return; }
 sessionPool = shuffle(wSample(base, n));
 studyQ = shuffle([...sessionPool]); sIdx=0; sCorrect=0;
 setFlow('match'); showPan('panMatch'); renderSMatch();
}
 
// session内消除赛
function renderSMatch() {
 const grid=document.getElementById('sGrid'); if(!grid) return;
 const pool=[...builtIn,...imported];
 if(pool.length<6){grid.innerHTML='<p style="text-align:center;padding:16px;color:#8a9088;font-size:12px;">词库不足，请先激活词汇</p>';return;}
 const words=shuffle([...pool].sort((a,b)=>getP(a.en)-getP(b.en)).slice(0,40)).slice(0,8);
 const cards=[];
 words.forEach(w=>{cards.push({t:w.en,id:w.en,type:'en'});cards.push({t:w.ch.split(/[；;]/)[0].trim(),id:w.en,type:'ch'});});
 document.getElementById('sScore').textContent=0;
 document.getElementById('sPairs').textContent=`0 / ${words.length} 对`;
 buildGrid(grid, shuffle(cards),
   (s,d)=>{document.getElementById('sScore').textContent=s;document.getElementById('sPairs').textContent=`${d} / ${words.length} 对`;},
   ()=>setTimeout(goToStudy,600)
 );
}
 
function goToStudy() {
 setFlow('study'); showPan('panStudy');
 sIdx=0; studyQ=shuffle([...sessionPool]); nextStudy();
}
 
function nextStudy() {
 if(sIdx>=studyQ.length){
   const wc=sessionPool.filter(w=>wrongs.some(r=>r.en===w.en)).length;
   document.getElementById('studyDoneMsg').textContent=`学习 ${studyQ.length} 词，答对 ${sCorrect}，错题 ${wc} 个`;
   setFlow('review'); showPan('panStudyDone'); return;
 }
 const w=studyQ[sIdx];
 document.getElementById('qWord').textContent=w.en;
 document.getElementById('studyInfo').textContent=`${sIdx+1} / ${studyQ.length}`;
 document.getElementById('studyProg').style.width=`${sIdx/studyQ.length*100}%`;
 document.getElementById('studyProf').textContent=PL[getP(w.en)];
 document.getElementById('uInput').value='';
 const fb=document.getElementById('qFb'); fb.className='sc-fb'; fb.innerHTML='';
 document.getElementById('qHint').textContent=getP(w.en)<=1?'⚡ 重点词':getP(w.en)>=3?'✓ 掌握良好':'';
 renderDots(w.en,'qDots');
 document.getElementById('uInput').focus();
}
 
function checkAnswer() {
 const user=document.getElementById('uInput').value.trim(); if(!user) return;
 const w=studyQ[sIdx], ok=isMatch(user,w.ch);
 const fb=document.getElementById('qFb');
 if(ok){
   fb.className='sc-fb fb-ok'; fb.innerHTML=`✓ 正确！<br><small>${w.ch}</small>`;
   addP(w.en,1); wrongs=wrongs.filter(x=>x.en!==w.en); sCorrect++;
   learnHist[todayStr()]=(learnHist[todayStr()]||0)+1;
   recentEns=recentEns.filter(e=>e!==w.en); recentEns.unshift(w.en);
   if(recentEns.length>200) recentEns=recentEns.slice(0,200);
   save(); setTimeout(()=>{sIdx++;nextStudy();},900);
 } else {
   fb.className='sc-fb fb-err'; fb.innerHTML=`✗ 记错了<br><small>${w.ch}</small>`;
   addP(w.en,-1); if(!wrongs.some(x=>x.en===w.en)) wrongs.push(w);
   save(); setTimeout(()=>{sIdx++;nextStudy();},2000);
 }
}
 
function skipWord() {
 const w=studyQ[sIdx];
 const fb=document.getElementById('qFb');
 fb.className='sc-fb fb-err'; fb.innerHTML=`跳过<br><small>${w.ch}</small>`;
 addP(w.en,-1); if(!wrongs.some(x=>x.en===w.en)) wrongs.push(w);
 save(); setTimeout(()=>{sIdx++;nextStudy();},1800);
}
 
function startReview() {
 const pool=wrongs.filter(w=>sessionPool.some(s=>s.en===w.en));
 if(!pool.length){document.getElementById('allDoneMsg').textContent='太棒了！本次没有错题 🎊';showPan('panDone');return;}
 reviewQ=shuffle([...pool]); rIdx=0; showPan('panReview'); nextReview();
}
 
function doStandaloneReview() {
 if(!wrongs.length){alert('暂无错题！');return;}
 goTab('p-session'); setFlow('review');
 reviewQ=shuffle([...wrongs]); rIdx=0; showPan('panReview'); nextReview();
}
 
function nextReview() {
 if(rIdx>=reviewQ.length){
   const left=wrongs.filter(w=>reviewQ.some(r=>r.en===w.en)).length;
   document.getElementById('allDoneMsg').textContent=`复习完成！剩余错题 ${left} 个`;
   showPan('panDone'); return;
 }
 const w=reviewQ[rIdx];
 document.getElementById('rWord').textContent=w.en;
 document.getElementById('reviewInfo').textContent=`${rIdx+1} / ${reviewQ.length}`;
 document.getElementById('reviewProg').style.width=`${rIdx/reviewQ.length*100}%`;
 document.getElementById('ruInput').value='';
 const fb=document.getElementById('rFb'); fb.className='sc-fb'; fb.innerHTML='';
 renderDots(w.en,'rDots');
 document.getElementById('ruInput').focus();
}
 
function checkReview() {
 const user=document.getElementById('ruInput').value.trim(); if(!user) return;
 const w=reviewQ[rIdx], ok=isMatch(user,w.ch);
 const fb=document.getElementById('rFb');
 if(ok){
   fb.className='sc-fb fb-ok'; fb.innerHTML=`✓ 正确！<br><small>${w.ch}</small>`;
   addP(w.en,1); wrongs=wrongs.filter(x=>x.en!==w.en); save();
   setTimeout(()=>{rIdx++;nextReview();},900);
 } else {
   fb.className='sc-fb fb-err'; fb.innerHTML=`✗ 还不熟<br><small>${w.ch}</small>`;
   addP(w.en,-1); save(); setTimeout(()=>{rIdx++;nextReview();},2000);
 }
}
 
function skipReview() {
 const w=reviewQ[rIdx];
 document.getElementById('rFb').className='sc-fb fb-err';
 document.getElementById('rFb').innerHTML=`跳过<br><small>${w.ch}</small>`;
 addP(w.en,-1); save(); setTimeout(()=>{rIdx++;nextReview();},1800);
}
 
function endSession() { setFlow('config'); showPan('panConfig'); }
 
// ── 消除赛通用 ──
function buildGrid(grid, cards, onScore, onComplete) {
 let first=null, score=0, done=0, total=cards.length/2;
 grid.innerHTML='';
 cards.forEach(c => {
   const d=document.createElement('div');
   d.className='mc'; d.dataset.id=c.id; d.dataset.type=c.type;
   d.innerHTML=`<span>${c.t}</span>`;
   d.onclick=function(){
     if(d.classList.contains('ok')) return;
     if(!first){first=d;d.classList.add('sel');return;}
     if(first===d){d.classList.remove('sel');first=null;return;}
     const sec=d;
     if(first.dataset.id===sec.dataset.id && first.dataset.type!==sec.dataset.type){
       first.classList.remove('sel'); first.classList.add('ok'); sec.classList.add('ok');
       addP(first.dataset.id,1); save();
       score+=10; done++;
       onScore(score,done,total);
       if(done>=total) onComplete();
     } else {
       const f=first;
       f.classList.add('err'); sec.classList.add('err');
       setTimeout(()=>{f.classList.remove('sel','err');sec.classList.remove('sel','err');},400);
     }
     first=null;
   };
   grid.appendChild(d);
 });
}
 
// 独立消除赛
let mSrc='recent';
function startMatch() {
 mSrc=document.getElementById('matchSource').value;
 document.getElementById('mCfgCard').style.display='none';
 document.getElementById('mGameCard').style.display='block';
 document.getElementById('mModeLbl').textContent={recent:'最近学习',builtin:'内置词库',imported:'导入词汇',mixed:'全部混合'}[mSrc];
 renderMatch();
}
 
function renderMatch() {
 const grid=document.getElementById('mGrid'); if(!grid) return;
 const all=[...builtIn,...imported];
 let pool;
 if(mSrc==='recent')    pool=recentEns.map(en=>all.find(w=>w.en===en)).filter(Boolean);
 else if(mSrc==='builtin')  pool=builtIn;
 else if(mSrc==='imported') pool=imported;
 else pool=all;
 if(pool.length<6){grid.innerHTML='<p style="padding:20px;text-align:center;font-size:13px;color:#8a9088;">词库不足，请先激活词汇</p>';return;}
 const words=shuffle([...pool].sort((a,b)=>getP(a.en)-getP(b.en)).slice(0,40)).slice(0,8);
 const cards=[];
 words.forEach(w=>{cards.push({t:w.en,id:w.en,type:'en'});cards.push({t:w.ch.split(/[；;]/)[0].trim(),id:w.en,type:'ch'});});
 document.getElementById('mScore').textContent=0;
 document.getElementById('mPairs').textContent=`0 / ${words.length} 对`;
 buildGrid(grid, shuffle(cards),
   (s,d)=>{document.getElementById('mScore').textContent=s;document.getElementById('mPairs').textContent=`${d} / ${words.length} 对`;},
   ()=>setTimeout(renderMatch,700)
 );
}
